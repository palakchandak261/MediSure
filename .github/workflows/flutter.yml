name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Analyze, test, and build ────────────────────────────────────────
  analyze-and-test:
    name: Analyze, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run format check
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Verify debug build (Android)
        run: flutter build apk --debug --no-pub

  # ── Job 2: Release APK build ────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ENABLE_REMOTE_BACKEND=false
          BACKEND_BASE_URL=https://placeholder.example.com
          BACKEND_API_KEY=${{ secrets.BACKEND_API_KEY }}
          OCR_API_KEY=${{ secrets.OCR_API_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          PAYMENT_GATEWAY_API_KEY=${{ secrets.PAYMENT_GATEWAY_API_KEY }}
          UPI_ID=medisure@upi
          UPI_PAYEE_NAME=MediSure Pharmacy
          IS_PRODUCTION=true
          EOF

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/medisure-release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=medisure
          storeFile=medisure-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Build release App Bundle (AAB)
        run: flutter build appbundle --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medisure-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: medisure-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── Job 3: Backend tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Create backend .env for CI
        run: |
          cat > backend/.env << 'EOF'
          PORT=3000
          NODE_ENV=test
          JWT_SECRET=ci_test_secret_not_for_production_use_only
          API_KEY=ci_test_api_key
          GOOGLE_VISION_API_KEY=
          RAZORPAY_KEY_ID=
          RAZORPAY_KEY_SECRET=
          UPI_ID=test@upi
          UPI_PAYEE_NAME=Test
          ALLOWED_ORIGINS=http://localhost:3000
          EOF

      - name: Run backend tests
        run: npm test
        working-directory: backend
        continue-on-error: true
