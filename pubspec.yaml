name: medisure
description: "MediSure - AI Prescription Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Image Handling
  image_picker: ^1.1.2

  # OCR - Google ML Kit (Mobile only)
  google_mlkit_text_recognition: ^0.13.0

  # HTTP
  http: ^1.2.0

  # Text to Speech
  flutter_tts: ^4.2.0

  # Utilities
  crypto: ^3.0.2
  flutter_secure_storage: ^8.0.0
  intl: ^0.20.1
  uuid: ^4.5.1

  # Local Notifications (in-app reminders)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # QR Code
  qr_flutter: ^4.1.0

  # URL Launcher
  url_launcher: ^6.3.0

  # GPS Location
  geolocator: ^13.0.2
  flutter_dotenv: ^5.0.2

  # Firebase (FCM push notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Firebase Crashlytics — production crash reporting
  firebase_crashlytics: ^4.1.3

  # Razorpay payment gateway
  razorpay_flutter: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/emailjs_template.html
    - assets/pharmacy_dataset.csv 
    - .env
